<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5B8DB8",
                        "secondary": "#7DBFA7",
                        "accent": "#2C3E50",
                        "background-light": "#F5F2EE",
                        "background-dark": "#1a1614",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.25rem", // 20px
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass {
            background: rgba(44, 62, 80, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-accent dark:text-slate-100 min-h-screen">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto overflow-x-hidden shadow-2xl">
<!-- Header -->
<div class="flex items-center p-6 justify-between">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full bg-white/50 dark:bg-accent/50 glass text-accent dark:text-white">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-accent dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Daily Check-In</h2>
</div>
<div class="px-6 flex flex-col gap-8 pb-32">
<!-- Question Section -->
<div class="text-center space-y-2">
<h1 class="text-accent dark:text-white tracking-tight text-3xl font-bold leading-tight">How are you feeling today?</h1>
<p class="text-primary font-medium">Step into your INKsight journey.</p>
</div>
<!-- Energy Level Container -->
<div class="glass rounded-xl p-6 shadow-sm">
<h4 class="text-accent/60 dark:text-white/60 text-xs font-bold leading-normal tracking-[0.1em] uppercase mb-6 text-center">Energy Level</h4>
<div class="flex w-full justify-between items-end px-2">
<!-- Energy Item: Drained -->
<div class="flex flex-col items-center gap-3 group cursor-pointer">
<div class="size-14 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center transition-transform hover:scale-110 shadow-inner overflow-hidden relative">
<div class="absolute inset-0 bg-gradient-to-tr from-slate-400 to-transparent opacity-20"></div>
<span class="material-symbols-outlined text-3xl text-slate-500">battery_low</span>
</div>
<p class="text-accent dark:text-slate-300 text-[12px] font-semibold">Drained</p>
</div>
<!-- Energy Item: Low -->
<div class="flex flex-col items-center gap-3 group cursor-pointer">
<div class="size-14 rounded-full bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center transition-transform hover:scale-110 shadow-inner overflow-hidden relative">
<div class="absolute inset-0 bg-gradient-to-tr from-orange-300 to-transparent opacity-20"></div>
<span class="material-symbols-outlined text-3xl text-orange-400">battery_1_bar</span>
</div>
<p class="text-accent dark:text-slate-300 text-[12px] font-semibold">Low</p>
</div>
<!-- Energy Item: Steady (Active) -->
<div class="flex flex-col items-center gap-3 group cursor-pointer">
<div class="size-16 rounded-full bg-primary/20 flex items-center justify-center transition-transform hover:scale-110 shadow-lg ring-2 ring-primary relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/30 to-transparent"></div>
<span class="material-symbols-outlined text-4xl text-primary font-bold">battery_5_bar</span>
</div>
<p class="text-primary text-[13px] font-bold">Steady</p>
</div>
<!-- Energy Item: Energetic -->
<div class="flex flex-col items-center gap-3 group cursor-pointer">
<div class="size-14 rounded-full bg-secondary/10 dark:bg-secondary/20 flex items-center justify-center transition-transform hover:scale-110 shadow-inner overflow-hidden relative">
<div class="absolute inset-0 bg-gradient-to-tr from-secondary/30 to-transparent opacity-20"></div>
<span class="material-symbols-outlined text-3xl text-secondary">battery_full</span>
</div>
<p class="text-accent dark:text-slate-300 text-[12px] font-semibold">Brisk</p>
</div>
<!-- Energy Item: Radiant -->
<div class="flex flex-col items-center gap-3 group cursor-pointer">
<div class="size-14 rounded-full bg-yellow-100 dark:bg-yellow-900/30 flex items-center justify-center transition-transform hover:scale-110 shadow-inner overflow-hidden relative">
<div class="absolute inset-0 bg-gradient-to-tr from-yellow-400 to-transparent opacity-30"></div>
<span class="material-symbols-outlined text-3xl text-yellow-600">bolt</span>
</div>
<p class="text-accent dark:text-slate-300 text-[12px] font-semibold">Radiant</p>
</div>
</div>
</div>
<!-- Focus Section -->
<div class="glass rounded-xl p-6 shadow-sm">
<h4 class="text-accent/60 dark:text-white/60 text-xs font-bold leading-normal tracking-[0.1em] uppercase mb-4">Today's Focus</h4>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2 rounded-full bg-white dark:bg-accent border border-primary/20 text-accent dark:text-white text-sm font-medium hover:bg-primary/10 transition-colors">Mindfulness</button>
<button class="px-5 py-2 rounded-full bg-primary text-white text-sm font-medium shadow-md shadow-primary/20">Creativity</button>
<button class="px-5 py-2 rounded-full bg-white dark:bg-accent border border-primary/20 text-accent dark:text-white text-sm font-medium hover:bg-primary/10 transition-colors">Physical Health</button>
<button class="px-5 py-2 rounded-full bg-white dark:bg-accent border border-primary/20 text-accent dark:text-white text-sm font-medium hover:bg-primary/10 transition-colors">Work-Life</button>
</div>
</div>
<!-- Notes Section -->
<div class="glass rounded-xl p-6 shadow-sm">
<label class="text-accent/60 dark:text-white/60 text-xs font-bold leading-normal tracking-[0.1em] uppercase mb-4 block">Quick Note</label>
<textarea class="w-full bg-white/50 dark:bg-accent/50 border-none rounded-lg p-4 text-accent dark:text-white placeholder:text-accent/40 focus:ring-2 focus:ring-primary/50 min-h-[100px] resize-none" placeholder="What's on your mind?"></textarea>
</div>
<button class="w-full py-4 bg-accent text-white rounded-full font-bold text-lg shadow-xl hover:bg-accent/90 active:scale-95 transition-all">
                Save Check-In
            </button>
</div>
<!-- Bottom Navigation Bar -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto z-50">
<div class="flex gap-2 border-t border-primary/10 bg-white/80 dark:bg-background-dark/80 glass px-4 pb-6 pt-3">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-accent/50 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">analytics</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Insights</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1" href="#">
<div class="flex h-12 w-12 items-center justify-center rounded-full bg-primary text-white shadow-lg -translate-y-4">
<span class="material-symbols-outlined text-3xl">add</span>
</div>
<p class="text-xs font-bold text-primary leading-normal tracking-wide">Log</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-accent/50 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">auto_graph</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Flow</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-accent/50 dark:text-slate-400" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-xs font-medium leading-normal tracking-wide">Profile</p>
</a>
</div>
</div>
</div>
</body></html>
