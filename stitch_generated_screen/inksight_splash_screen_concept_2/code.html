<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>INKsight Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700&amp;family=Nunito:wght@700&amp;family=Lora:ital@1&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5B8DB8", // Derived from ink drop icon color
                        "background-light": "#F5F2EE",
                        "background-dark": "#221610",
                        "ink-drop": "#5B8DB8",
                        "tagline": "#7F8C8D",
                        "sage": "#7DBFA7"
                    },
                    fontFamily: {
                        "display": ["Public Sans"],
                        "nunito": ["Nunito"],
                        "lora": ["Lora"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex h-screen w-full flex-col items-center justify-between overflow-hidden bg-gradient-to-b from-[#F5F2EE] to-[#E8E2D9] dark:from-background-dark dark:to-slate-900">
<!-- Header Image Placeholder / Spacer -->
<div class="w-full @container pt-12">
<div class="@[480px]:px-4">
<!-- Abstract Watercolor background matching description -->
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden @[480px]:rounded-xl min-h-[120px]" data-alt="Abstract soft watercolor ink wash in blue and beige" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC2oSxAOz37u5_qEXfjq55LIxpfcOknY4s58gl56LCn5lNMNQA8QygFGFNEDHKBdrZ3-HleWHHMyqa5iuY-7Xruwet30l4YU-xtw-QCbkuMCJBQRXp8vaZ05-u59o590NdAqxEmHU__uUtGn62bvp1-EzmflFErVkMDFihs6UOR2rfvbSvH9aQA2iwDny4UkYvGbnXO3PlsqO6l3zkBAOAEaPZRDm4SrovdhkuwKNFmAXe3VjpvErgeX3FHhcmlv5b6R8o9pxfpk9w");'></div>
</div>
</div>
<!-- Main Content Center -->
<div class="flex flex-col items-center px-8 text-center">
<!-- Watercolor Ink Drop Icon -->
<div class="mb-8 flex items-center justify-center">
<div class="relative flex items-center justify-center w-24 h-24">
<div class="absolute inset-0 bg-ink-drop opacity-20 rounded-full blur-2xl"></div>
<span class="material-symbols-outlined text-ink-drop text-7xl select-none" style="font-variation-settings: 'FILL' 1, 'wght' 300;">
                        water_drop
                    </span>
</div>
</div>
<!-- App Title -->
<h1 class="font-nunito text-[32px] font-bold leading-tight text-slate-800 dark:text-slate-100 tracking-tight">
                INKsight
            </h1>
<!-- Tagline -->
<p class="font-lora italic text-[14px] text-tagline dark:text-tagline/80 mt-3 max-w-[260px] leading-relaxed">
                The patterns in your words. The truth in your mind.
            </p>
</div>
<!-- Bottom Breathing Element -->
<div class="pb-[80px] flex flex-col items-center gap-4">
<div class="relative flex items-center justify-center">
<!-- Sage Green Breathing Circle with Glow -->
<div class="absolute h-6 w-6 rounded-full bg-sage/30 blur-md"></div>
<div class="h-3 w-3 rounded-full bg-sage shadow-[0_0_12px_rgba(125,191,167,0.6)]"></div>
</div>
<!-- Subtle indicators from component list logic -->
<div class="flex flex-row items-center justify-center gap-3">
<div class="h-1.5 w-1.5 rounded-full bg-ink-drop/40"></div>
<div class="h-1.5 w-1.5 rounded-full bg-ink-drop/10"></div>
<div class="h-1.5 w-1.5 rounded-full bg-ink-drop/10"></div>
</div>
</div>
</div>
</body></html>
