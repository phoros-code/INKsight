<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700&amp;family=Nunito:wght@700&amp;family=Lora:ital,wght@1,400&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5B8DB8",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1E2A3A",
                        "emotion-joy": "#F5D769",
                        "emotion-trust": "#7DBFA7",
                        "emotion-fear": "#89ABD4",
                        "emotion-surprise": "#F0A868",
                        "emotion-sadness": "#8899C4",
                        "emotion-disgust": "#A89FC4",
                        "emotion-anger": "#D4896A",
                        "emotion-anticipation": "#90C49A",
                        "ui-accent": "#8AA8C4",
                        "ui-deep": "#253447"
                    },
                    fontFamily: {
                        "display": ["Public Sans"],
                        "nunito": ["Nunito"],
                        "lora": ["Lora"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
        }
        .segment {
            position: absolute;
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 50%, 50% 0%, 85% 15%);
            transform-origin: 50% 50%;
        }
        .intensity-ring {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center">
<!-- Top Navigation Bar -->
<div class="w-full max-w-md flex flex-col items-center pt-6 px-4">
<div class="flex items-center w-full justify-between mb-8">
<div class="text-ui-accent flex size-10 items-center justify-center rounded-full hover:bg-ui-deep cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-white font-nunito text-lg font-bold">INKsight</h2>
<div class="size-10"></div> <!-- Spacer -->
</div>
<!-- Header Titles -->
<h1 class="text-white font-nunito text-[22px] font-bold leading-tight tracking-[-0.015em] text-center mb-2">
            What are you feeling?
        </h1>
<p class="text-ui-accent font-lora italic text-[14px] leading-normal text-center mb-10">
            Tap the emotion that feels closest. Then go deeper.
        </p>
<!-- Plutchik-inspired Emotion Wheel -->
<div class="wheel-container relative flex items-center justify-center mb-12">
<!-- Background Glow for Active Segment (Sadness positioned at bottom) -->
<div class="absolute inset-0 bg-emotion-sadness/20 rounded-full blur-3xl"></div>
<!-- Wheel SVG Implementation for precision segments -->
<svg class="w-full h-full transform -rotate-22.5" viewbox="0 0 100 100">
<!-- Outer Segments (Lower Intensity) -->
<path d="M50,50 L50,0 A50,50 0 0,1 85.3,14.7 Z" fill="#F5D769" opacity="0.4" transform="rotate(0, 50, 50)"></path>
<path d="M50,50 L50,0 A50,50 0 0,1 85.3,14.7 Z" fill="#7DBFA7" opacity="0.4" transform="rotate(45, 50, 50)"></path>
<path d="M50,50 L50,0 A50,50 0 0,1 85.3,14.7 Z" fill="#89ABD4" opacity="0.4" transform="rotate(90, 50, 50)"></path>
<path d="M50,50 L50,0 A50,50 0 0,1 85.3,14.7 Z" fill="#F0A868" opacity="0.4" transform="rotate(135, 50, 50)"></path>
<path class="drop-shadow-[0_0_8px_rgba(136,153,196,0.8)]" d="M50,50 L50,0 A50,50 0 0,1 85.3,14.7 Z" fill="#8899C4" opacity="0.4" transform="rotate(180, 50, 50)"></path>
<path d="M50,50 L50,0 A50,50 0 0,1 85.3,14.7 Z" fill="#A89FC4" opacity="0.4" transform="rotate(225, 50, 50)"></path>
<path d="M50,50 L50,0 A50,50 0 0,1 85.3,14.7 Z" fill="#D4896A" opacity="0.4" transform="rotate(270, 50, 50)"></path>
<path d="M50,50 L50,0 A50,50 0 0,1 85.3,14.7 Z" fill="#90C49A" opacity="0.4" transform="rotate(315, 50, 50)"></path>
<!-- Middle Segments (Medium Intensity) -->
<path d="M50,50 L50,15 A35,35 0 0,1 74.7,25.3 Z" fill="#F5D769" opacity="0.7" transform="rotate(0, 50, 50)"></path>
<path d="M50,50 L50,15 A35,35 0 0,1 74.7,25.3 Z" fill="#7DBFA7" opacity="0.7" transform="rotate(45, 50, 50)"></path>
<path d="M50,50 L50,15 A35,35 0 0,1 74.7,25.3 Z" fill="#89ABD4" opacity="0.7" transform="rotate(90, 50, 50)"></path>
<path d="M50,50 L50,15 A35,35 0 0,1 74.7,25.3 Z" fill="#F0A868" opacity="0.7" transform="rotate(135, 50, 50)"></path>
<path d="M50,50 L50,15 A35,35 0 0,1 74.7,25.3 Z" fill="#8899C4" opacity="0.7" transform="rotate(180, 50, 50)"></path>
<path d="M50,50 L50,15 A35,35 0 0,1 74.7,25.3 Z" fill="#A89FC4" opacity="0.7" transform="rotate(225, 50, 50)"></path>
<path d="M50,50 L50,15 A35,35 0 0,1 74.7,25.3 Z" fill="#D4896A" opacity="0.7" transform="rotate(270, 50, 50)"></path>
<path d="M50,50 L50,15 A35,35 0 0,1 74.7,25.3 Z" fill="#90C49A" opacity="0.7" transform="rotate(315, 50, 50)"></path>
<!-- Inner Segments (High Intensity) -->
<path d="M50,50 L50,30 A20,20 0 0,1 64.1,35.9 Z" fill="#F5D769" transform="rotate(0, 50, 50)"></path>
<path d="M50,50 L50,30 A20,20 0 0,1 64.1,35.9 Z" fill="#7DBFA7" transform="rotate(45, 50, 50)"></path>
<path d="M50,50 L50,30 A20,20 0 0,1 64.1,35.9 Z" fill="#89ABD4" transform="rotate(90, 50, 50)"></path>
<path d="M50,50 L50,30 A20,20 0 0,1 64.1,35.9 Z" fill="#F0A868" transform="rotate(135, 50, 50)"></path>
<path d="M50,50 L50,30 A20,20 0 0,1 64.1,35.9 Z" fill="#8899C4" transform="rotate(180, 50, 50)"></path>
<path d="M50,50 L50,30 A20,20 0 0,1 64.1,35.9 Z" fill="#A89FC4" transform="rotate(225, 50, 50)"></path>
<path d="M50,50 L50,30 A20,20 0 0,1 64.1,35.9 Z" fill="#D4896A" transform="rotate(270, 50, 50)"></path>
<path d="M50,50 L50,30 A20,20 0 0,1 64.1,35.9 Z" fill="#90C49A" transform="rotate(315, 50, 50)"></path>
</svg>
<!-- Center Circle -->
<div class="absolute w-[60px] h-[60px] bg-white rounded-full flex items-center justify-center shadow-lg border-2 border-background-dark">
<span class="text-background-dark font-nunito font-bold text-xs uppercase tracking-tighter">Sadness</span>
</div>
</div>
<!-- Selected Emotion and Secondary Chips -->
<div class="flex flex-col items-center w-full">
<h2 class="text-white font-nunito text-[20px] font-bold mb-6">Sadness</h2>
<div class="flex flex-wrap justify-center gap-3 px-6 mb-12">
<button class="bg-ui-deep border border-white/5 px-5 py-2 rounded-full text-ui-accent text-sm font-medium hover:bg-ui-deep/80 transition-colors">
                    lonely
                </button>
<button class="bg-ui-deep border border-primary/40 px-5 py-2 rounded-full text-primary text-sm font-bold shadow-[0_0_10px_rgba(91,141,184,0.2)]">
                    melancholic
                </button>
<button class="bg-ui-deep border border-white/5 px-5 py-2 rounded-full text-ui-accent text-sm font-medium hover:bg-ui-deep/80 transition-colors">
                    empty
                </button>
<button class="bg-ui-deep border border-white/5 px-5 py-2 rounded-full text-ui-accent text-sm font-medium hover:bg-ui-deep/80 transition-colors">
                    gloomy
                </button>
</div>
</div>
<!-- Footer Actions -->
<div class="w-full flex flex-col items-center gap-6 pb-12 mt-auto">
<button class="w-full max-w-[280px] bg-primary hover:bg-primary/90 text-white font-nunito font-bold py-4 rounded-full shadow-lg shadow-primary/20 transition-all active:scale-95">
                Add to Journal
            </button>
<button class="text-ui-accent text-sm font-medium hover:text-white transition-colors">
                Skip for now
            </button>
</div>
</div>
</body></html>
